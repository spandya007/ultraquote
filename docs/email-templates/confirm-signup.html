<!--
  Supabase Auth → Emails → Templates → "Confirm signup"
  Used for: email confirmation on direct sign-up. NOTE: UltraQuote currently
  onboards via INVITE only (no self-serve sign-up), so this template is rarely
  hit today — included for completeness / future self-serve, and to keep the
  branding consistent if confirmation is ever enabled.
  Subject:  Confirm your UltraQuote email
  Variables: .ConfirmationURL (keep!), .Email
-->
<h2>Confirm your email</h2>
<p>Hi,</p>
<p>
  Thanks for signing up for UltraQuote. Please confirm <strong>{{ .Email }}</strong>
  to activate your account.
</p>
<p>
  <a href="{{ .ConfirmationURL }}"
     style="display:inline-block;padding:10px 18px;background:#4f46e5;color:#fff;
            border-radius:6px;text-decoration:none;font-weight:600;">
    Confirm my email
  </a>
</p>
<p style="color:#6b7280;font-size:13px;">
  If you didn't create this account, you can ignore this email.
</p>
